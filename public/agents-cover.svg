<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="Agent Templates — copyable system prompts by scenario">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f3ec"/><stop offset="1" stop-color="#ece6da"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#8a682c" stop-opacity="0.13"/><stop offset="1" stop-color="#8a682c" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <ellipse cx="600" cy="320" rx="520" ry="360" fill="url(#glow)"/>

  <text x="80" y="104" font-family="'Cormorant Garamond', Georgia, serif" font-size="56" font-weight="600" fill="#1c1a17">Agent 模板库</text>
  <text x="82" y="150" font-family="'JetBrains Mono', monospace" font-size="20" fill="#8a682c">Agent Templates · copy a system prompt, ship an agent</text>

