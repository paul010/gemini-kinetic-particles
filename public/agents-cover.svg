  <text x="80" y="688" font-family="'JetBrains Mono', monospace" font-size="17" fill="#1c1a17" fill-opacity="0.55">内容创作 · 工程开发 · 营销增长 · 效率办公 · 产品 · 研究 — 复制即用的系统提示词</text>
