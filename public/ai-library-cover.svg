<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="Free AI Solutions Library — Notion database gallery">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f3ec"/>
      <stop offset="1" stop-color="#ece6da"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#8a682c" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#8a682c" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>
  <ellipse cx="640" cy="330" rx="520" ry="380" fill="url(#glow)"/>

  <!-- heading -->
  <text x="80" y="108" font-family="'Cormorant Garamond', Georgia, serif" font-size="58" font-weight="600" fill="#1c1a17">大雷免费 AI 方案库</text>
  <text x="82" y="156" font-family="'JetBrains Mono', monospace" font-size="20" fill="#8a682c">Free AI Solutions Library · open-source, landing-ready</text>

  <!-- gallery of solution cards -->
  <g font-family="'JetBrains Mono', monospace">
    <!-- card template repeated; each: panel + title bar + tag chips -->
    <!-- row 1 -->
    <g filter="url(#soft)"><rect x="80" y="210" width="320" height="220" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.12)"/></g>
    <rect x="104" y="234" width="150" height="14" rx="7" fill="rgba(28,26,23,0.78)"/>
    <rect x="104" y="262" width="220" height="9" rx="4.5" fill="rgba(28,26,23,0.22)"/>
    <rect x="104" y="280" width="180" height="9" rx="4.5" fill="rgba(28,26,23,0.18)"/>
    <g font-size="13">
      <g><rect x="104" y="318" width="84" height="26" rx="13" fill="#8a682c" fill-opacity="0.14"/><text x="146" y="336" text-anchor="middle" fill="#8a682c">AI Agent</text></g>
      <g><rect x="198" y="318" width="64" height="26" rx="13" fill="rgba(28,26,23,0.07)"/><text x="230" y="336" text-anchor="middle" fill="rgba(28,26,23,0.6)">开源</text></g>
    </g>
    <g font-size="12"><text x="104" y="400" fill="rgba(28,26,23,0.4)">★ 方案指数 92 · 已亲测</text></g>

    <g filter="url(#soft)"><rect x="440" y="210" width="320" height="220" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.12)"/></g>
    <rect x="464" y="234" width="120" height="14" rx="7" fill="rgba(28,26,23,0.78)"/>
    <rect x="464" y="262" width="220" height="9" rx="4.5" fill="rgba(28,26,23,0.22)"/>
    <rect x="464" y="280" width="160" height="9" rx="4.5" fill="rgba(28,26,23,0.18)"/>
    <g font-size="13">
      <g><rect x="464" y="318" width="52" height="26" rx="13" fill="#8a682c" fill-opacity="0.14"/><text x="490" y="336" text-anchor="middle" fill="#8a682c">RAG</text></g>
      <g><rect x="526" y="318" width="64" height="26" rx="13" fill="rgba(28,26,23,0.07)"/><text x="558" y="336" text-anchor="middle" fill="rgba(28,26,23,0.6)">免费</text></g>
    </g>
    <g font-size="12"><text x="464" y="400" fill="rgba(28,26,23,0.4)">★ 方案指数 88 · 待验证</text></g>

    <g filter="url(#soft)"><rect x="800" y="210" width="320" height="220" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.12)"/></g>
    <rect x="824" y="234" width="160" height="14" rx="7" fill="rgba(28,26,23,0.78)"/>
    <rect x="824" y="262" width="220" height="9" rx="4.5" fill="rgba(28,26,23,0.22)"/>
    <rect x="824" y="280" width="140" height="9" rx="4.5" fill="rgba(28,26,23,0.18)"/>
    <g font-size="13">
      <g><rect x="824" y="318" width="48" height="26" rx="13" fill="#8a682c" fill-opacity="0.14"/><text x="848" y="336" text-anchor="middle" fill="#8a682c">MCP</text></g>
      <g><rect x="882" y="318" width="96" height="26" rx="13" fill="rgba(28,26,23,0.07)"/><text x="930" y="336" text-anchor="middle" fill="rgba(28,26,23,0.6)">Deep Research</text></g>
    </g>
    <g font-size="12"><text x="824" y="400" fill="rgba(28,26,23,0.4)">★ 方案指数 95 · 已亲测</text></g>
  </g>

  <!-- view tabs -->
  <g font-family="'JetBrains Mono', monospace" font-size="15" fill="rgba(28,26,23,0.55)">
    <text x="80" y="500">Gallery</text>
    <text x="190" y="500">Table</text>
    <text x="290" y="500">Board · 行业</text>
    <text x="470" y="500">Calendar · AI 日报</text>
  </g>
  <line x1="80" y1="516" x2="1120" y2="516" stroke="rgba(28,26,23,0.1)"/>

  <!-- footer caption -->
  <text x="80" y="690" font-family="'JetBrains Mono', monospace" font-size="17" fill="#1c1a17" fill-opacity="0.55">分类 · 应用场景 · 成熟度 · 成本 · 商业价值 · 适合人群 · 是否亲测 — 持续更新</text>
</svg>
