<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="Microsoft Copilot / Agent product matrix — three tiers">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f3ec"/><stop offset="1" stop-color="#ece6da"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>

  <text x="80" y="104" font-family="'Cormorant Garamond', Georgia, serif" font-size="54" font-weight="600" fill="#1c1a17">Microsoft Copilot / Agent</text>
  <text x="82" y="150" font-family="'JetBrains Mono', monospace" font-size="19" fill="#8a682c">三层架构 · 使用 → 无代码创建 → 开发 · 截至 2026-06</text>

  <!-- three tier columns -->
  <g font-family="'JetBrains Mono', monospace">
    <!-- Tier 1 -->
    <g filter="url(#soft)"><rect x="80" y="210" width="330" height="420" rx="16" fill="#fffdf8" stroke="rgba(28,26,23,0.1)"/></g>
    <rect x="80" y="210" width="330" height="6" rx="3" fill="#5c8a3a"/>
    <circle cx="116" cy="256" r="16" fill="#5c8a3a"/><text x="116" y="262" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">1</text>
    <text x="144" y="252" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1c1a17">使用</text>
    <text x="144" y="276" font-size="13" fill="rgba(28,26,23,0.5)">Copilot / Cowork</text>
    <g font-size="15" fill="rgba(28,26,23,0.8)">
      <rect x="104" y="312" width="282" height="56" rx="10" fill="rgba(28,26,23,0.04)"/>
      <text x="120" y="345" font-weight="700">Microsoft 365 Copilot</text>
      <rect x="104" y="380" width="282" height="56" rx="10" fill="rgba(28,26,23,0.04)"/>
      <text x="120" y="413" font-weight="700">Copilot Cowork</text>
    </g>
    <text x="104" y="478" font-size="13" fill="rgba(28,26,23,0.45)">日常办公 · AI 自动执行</text>

    <!-- Tier 2 -->
    <g filter="url(#soft)"><rect x="435" y="210" width="330" height="420" rx="16" fill="#fffdf8" stroke="rgba(28,26,23,0.1)"/></g>
    <rect x="435" y="210" width="330" height="6" rx="3" fill="#c2703c"/>
    <circle cx="471" cy="256" r="16" fill="#c2703c"/><text x="471" y="262" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">2</text>
    <text x="499" y="252" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1c1a17">无代码创建</text>
    <text x="499" y="276" font-size="13" fill="rgba(28,26,23,0.5)">Agent Builder / Studio</text>
    <g font-size="15" fill="rgba(28,26,23,0.8)">
      <rect x="459" y="312" width="282" height="56" rx="10" fill="rgba(28,26,23,0.04)"/>
      <text x="475" y="345" font-weight="700">M365 Agent Builder</text>
      <rect x="459" y="380" width="282" height="56" rx="10" fill="rgba(28,26,23,0.04)"/>
      <text x="475" y="413" font-weight="700">Copilot Studio</text>
    </g>
    <text x="459" y="478" font-size="13" fill="rgba(28,26,23,0.45)">业务人员 · 企业级 Agent</text>

    <!-- Tier 3 -->
    <g filter="url(#soft)"><rect x="790" y="210" width="330" height="420" rx="16" fill="#fffdf8" stroke="rgba(28,26,23,0.1)"/></g>
    <rect x="790" y="210" width="330" height="6" rx="3" fill="#7a5cab"/>
    <circle cx="826" cy="256" r="16" fill="#7a5cab"/><text x="826" y="262" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">3</text>
    <text x="854" y="252" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1c1a17">开发</text>
    <text x="854" y="276" font-size="13" fill="rgba(28,26,23,0.5)">Foundry / 开发栈</text>
    <g font-size="15" fill="rgba(28,26,23,0.8)">
      <rect x="814" y="312" width="282" height="56" rx="10" fill="rgba(28,26,23,0.04)"/>
      <text x="830" y="345" font-weight="700">Microsoft Foundry</text>
      <rect x="814" y="380" width="282" height="56" rx="10" fill="rgba(28,26,23,0.04)"/>
      <text x="830" y="413" font-weight="700">Agent Framework + Toolkit</text>
    </g>
    <text x="814" y="478" font-size="13" fill="rgba(28,26,23,0.45)">开发者 · 生产级 AI 应用</text>
  </g>

  <!-- flow arrows between tiers -->
  <g fill="rgba(28,26,23,0.3)" font-family="'JetBrains Mono', monospace" font-size="28">
    <text x="412" y="420" text-anchor="middle">→</text>
    <text x="767" y="420" text-anchor="middle">→</text>
  </g>

  <text x="80" y="688" font-family="'JetBrains Mono', monospace" font-size="17" fill="#1c1a17" fill-opacity="0.55">许可证 · Credit 消耗 · 能做什么 · 主要用途 — 一图看懂员工→开发者的 AI Agent 路径</text>
</svg>
