<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="Skill Library — modular agent capabilities by provider">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f3ec"/><stop offset="1" stop-color="#ece6da"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#8a682c" stop-opacity="0.13"/><stop offset="1" stop-color="#8a682c" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <ellipse cx="600" cy="320" rx="520" ry="360" fill="url(#glow)"/>

  <text x="80" y="104" font-family="'Cormorant Garamond', Georgia, serif" font-size="56" font-weight="600" fill="#1c1a17">Skill 技能库</text>
  <text x="82" y="150" font-family="'JetBrains Mono', monospace" font-size="20" fill="#8a682c">Skill Library · powers you plug into an agent</text>

  <!-- skill chips: emoji + name + provider pill, in a flowing grid -->
  <g font-family="'JetBrains Mono', monospace">
    <!-- row helper: each chip ~ 250 wide -->
    <!-- r1 -->
    <g filter="url(#soft)"><rect x="80" y="210" width="250" height="84" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.1)"/></g>
    <text x="104" y="258" font-size="26">🔎</text><text x="140" y="250" font-size="16" font-weight="700" fill="#1c1a17">YouTube 研究</text>
    <rect x="140" y="262" width="86" height="20" rx="10" fill="rgba(138,104,44,0.1)"/><text x="183" y="276" text-anchor="middle" font-size="11" fill="#8a682c">SerpAPI</text>

    <g filter="url(#soft)"><rect x="350" y="210" width="250" height="84" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.1)"/></g>
    <text x="374" y="258" font-size="26">🔊</text><text x="410" y="250" font-size="16" font-weight="700" fill="#1c1a17">语音合成</text>
    <rect x="410" y="262" width="98" height="20" rx="10" fill="rgba(138,104,44,0.1)"/><text x="459" y="276" text-anchor="middle" font-size="11" fill="#8a682c">ElevenLabs</text>

    <g filter="url(#soft)"><rect x="620" y="210" width="250" height="84" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.1)"/></g>
    <text x="644" y="258" font-size="26">🌐</text><text x="680" y="250" font-size="16" font-weight="700" fill="#1c1a17">联网搜索</text>
    <rect x="680" y="262" width="70" height="20" rx="10" fill="rgba(138,104,44,0.1)"/><text x="715" y="276" text-anchor="middle" font-size="11" fill="#8a682c">Tavily</text>

    <g filter="url(#soft)"><rect x="890" y="210" width="230" height="84" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.1)"/></g>
    <text x="914" y="258" font-size="26">📈</text><text x="950" y="250" font-size="16" font-weight="700" fill="#1c1a17">行情数据</text>
    <rect x="950" y="262" width="108" height="20" rx="10" fill="rgba(138,104,44,0.1)"/><text x="1004" y="276" text-anchor="middle" font-size="11" fill="#8a682c">Alpha Vant.</text>

    <!-- r2 -->
    <g filter="url(#soft)"><rect x="80" y="314" width="250" height="84" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.1)"/></g>
    <text x="104" y="362" font-size="26">🧮</text><text x="140" y="354" font-size="16" font-weight="700" fill="#1c1a17">代码执行</text>
    <rect x="140" y="366" width="84" height="20" rx="10" fill="rgba(138,104,44,0.1)"/><text x="182" y="380" text-anchor="middle" font-size="11" fill="#8a682c">Sandbox</text>

    <g filter="url(#soft)"><rect x="350" y="314" width="250" height="84" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.1)"/></g>
    <text x="374" y="362" font-size="26">🗄️</text><text x="410" y="354" font-size="16" font-weight="700" fill="#1c1a17">SQL 查询</text>
    <rect x="410" y="366" width="82" height="20" rx="10" fill="rgba(138,104,44,0.1)"/><text x="451" y="380" text-anchor="middle" font-size="11" fill="#8a682c">Postgres</text>

    <g filter="url(#soft)"><rect x="620" y="314" width="250" height="84" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.1)"/></g>
    <text x="644" y="362" font-size="26">📌</text><text x="680" y="354" font-size="16" font-weight="700" fill="#1c1a17">向量检索</text>
    <rect x="680" y="366" width="82" height="20" rx="10" fill="rgba(138,104,44,0.1)"/><text x="721" y="380" text-anchor="middle" font-size="11" fill="#8a682c">pgvector</text>

    <g filter="url(#soft)"><rect x="890" y="314" width="230" height="84" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.1)"/></g>
    <text x="914" y="362" font-size="26">🐙</text><text x="950" y="354" font-size="16" font-weight="700" fill="#1c1a17">GitHub</text>
    <rect x="950" y="366" width="92" height="20" rx="10" fill="rgba(138,104,44,0.1)"/><text x="996" y="380" text-anchor="middle" font-size="11" fill="#8a682c">GitHub API</text>

    <!-- r3 -->
    <g filter="url(#soft)"><rect x="80" y="418" width="250" height="84" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.1)"/></g>
    <text x="104" y="466" font-size="26">🎨</text><text x="140" y="458" font-size="16" font-weight="700" fill="#1c1a17">图像生成</text>
    <rect x="140" y="470" width="56" height="20" rx="10" fill="rgba(138,104,44,0.1)"/><text x="168" y="484" text-anchor="middle" font-size="11" fill="#8a682c">Flux</text>

    <g filter="url(#soft)"><rect x="350" y="418" width="250" height="84" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.1)"/></g>
    <text x="374" y="466" font-size="26">🧾</text><text x="410" y="458" font-size="16" font-weight="700" fill="#1c1a17">文档解析</text>
    <rect x="410" y="470" width="98" height="20" rx="10" fill="rgba(138,104,44,0.1)"/><text x="459" y="484" text-anchor="middle" font-size="11" fill="#8a682c">LlamaParse</text>

    <g filter="url(#soft)"><rect x="620" y="418" width="250" height="84" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.1)"/></g>
    <text x="644" y="466" font-size="26">🕹️</text><text x="680" y="458" font-size="16" font-weight="700" fill="#1c1a17">浏览器自动化</text>
    <rect x="680" y="470" width="92" height="20" rx="10" fill="rgba(138,104,44,0.1)"/><text x="726" y="484" text-anchor="middle" font-size="11" fill="#8a682c">Playwright</text>

    <g filter="url(#soft)"><rect x="890" y="418" width="230" height="84" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.1)"/></g>
    <text x="914" y="466" font-size="26">🌍</text><text x="950" y="458" font-size="16" font-weight="700" fill="#1c1a17">翻译</text>
    <rect x="950" y="470" width="60" height="20" rx="10" fill="rgba(138,104,44,0.1)"/><text x="980" y="484" text-anchor="middle" font-size="11" fill="#8a682c">DeepL</text>
  </g>

  <text x="80" y="560" font-family="'JetBrains Mono', monospace" font-size="16" fill="rgba(28,26,23,0.5)">媒体创作 · 研究检索 · 数据与地点 · 电商出行 · 开发与效率</text>
  <text x="80" y="688" font-family="'JetBrains Mono', monospace" font-size="17" fill="#1c1a17" fill-opacity="0.55">可插拔的能力 · 接一个服务/API · 复制技能简介即可加进 Agent</text>
</svg>
