<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="Smallville — a small town of generative agents">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f3ec"/><stop offset="1" stop-color="#e9e2d2"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="url(#sky)"/>

  <!-- paths -->
  <g stroke="rgba(28,26,23,0.07)" stroke-width="52" stroke-linecap="round">
    <line x1="150" y1="430" x2="1050" y2="430"/>
    <line x1="600" y1="230" x2="600" y2="640"/>
  </g>

  <!-- buildings -->
  <g font-family="serif" text-anchor="middle">
    <g filter="url(#soft)"><rect x="150" y="330" width="180" height="130" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.14)"/></g>
    <rect x="150" y="330" width="180" height="10" rx="5" fill="#c2703c"/><text x="240" y="405" font-size="40">☕</text>
    <text x="240" y="440" font-family="'JetBrains Mono', monospace" font-size="15" fill="rgba(28,26,23,0.55)">Café</text>

    <g filter="url(#soft)"><rect x="510" y="150" width="190" height="130" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.14)"/></g>
    <rect x="510" y="150" width="190" height="10" rx="5" fill="#7a5cab"/><text x="605" y="225" font-size="40">📚</text>
    <text x="605" y="260" font-family="'JetBrains Mono', monospace" font-size="15" fill="rgba(28,26,23,0.55)">Library</text>

    <g filter="url(#soft)"><rect x="880" y="330" width="180" height="140" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.14)"/></g>
    <rect x="880" y="330" width="180" height="10" rx="5" fill="#3a7a7a"/><text x="970" y="410" font-size="40">🏢</text>
    <text x="970" y="448" font-family="'JetBrains Mono', monospace" font-size="15" fill="rgba(28,26,23,0.55)">Office</text>

    <g filter="url(#soft)"><rect x="490" y="540" width="230" height="140" rx="14" fill="#fffdf8" stroke="rgba(28,26,23,0.14)"/></g>
    <rect x="490" y="540" width="230" height="10" rx="5" fill="#5c8a3a"/><text x="605" y="620" font-size="40">🌳</text>
    <text x="605" y="658" font-family="'JetBrains Mono', monospace" font-size="15" fill="rgba(28,26,23,0.55)">Park</text>

    <g filter="url(#soft)"><circle cx="600" cy="430" r="58" fill="#fffdf8" stroke="rgba(28,26,23,0.14)"/></g>
    <text x="600" y="442" font-size="34">⛲</text>
  </g>

  <!-- agents (colored dots with little names) -->
  <g font-family="'JetBrains Mono', monospace" font-size="13" text-anchor="middle">
    <g><circle cx="330" cy="410" r="11" fill="#d97757" stroke="#fff" stroke-width="2.5"/><text x="330" y="388" fill="rgba(28,26,23,0.65)">Isabella</text></g>
    <g><circle cx="560" cy="300" r="11" fill="#7a5cab" stroke="#fff" stroke-width="2.5"/><text x="560" y="284" fill="rgba(28,26,23,0.65)">Klaus</text></g>
    <g><circle cx="650" cy="300" r="11" fill="#4285f4" stroke="#fff" stroke-width="2.5"/><text x="650" y="284" fill="rgba(28,26,23,0.65)">Maria</text></g>
    <g><circle cx="600" cy="600" r="11" fill="#5c8a3a" stroke="#fff" stroke-width="2.5"/><text x="600" y="584" fill="rgba(28,26,23,0.65)">Tom</text></g>
    <g><circle cx="900" cy="410" r="11" fill="#3a9a9a" stroke="#fff" stroke-width="2.5"/><text x="900" y="394" fill="rgba(28,26,23,0.65)">Ayesha</text></g>
    <g><circle cx="640" cy="445" r="11" fill="#c0413a" stroke="#fff" stroke-width="2.5"/><text x="640" y="478" fill="rgba(28,26,23,0.65)">Wolfgang</text></g>
  </g>
  <text x="605" y="338" font-size="20" text-anchor="middle">💬</text>

  <!-- title -->
  <text x="80" y="92" font-family="'Cormorant Garamond', Georgia, serif" font-size="56" font-weight="600" fill="#1c1a17">Smallville · 小镇</text>
  <text x="82" y="700" font-family="'JetBrains Mono', monospace" font-size="17" fill="#1c1a17" fill-opacity="0.55">生成式智能体 · 居民按日程生活:睡觉 → 咖啡 → 上班 → 广场闲聊 · 灵感来自 Stanford Generative Agents</text>
</svg>
